<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEVBLOG</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:  #ffffff;
  --fg:  #000000;
  --red: #ff0000;
  --blu: #0000ff;
  --grn: #007700;
  --b:   4px solid #000;
  --gutter: clamp(10px, 2.2vw, 20px);
  --font: 'JetBrains Mono', 'Courier New', monospace;
}

html { background: var(--bg); }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

::selection { background: #000; color: #fff; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #fff; }
::-webkit-scrollbar-thumb { background: #000; }

/* ticker */
@keyframes ticker { to { transform: translateX(-50%); } }
.tick { animation: ticker 36s linear infinite; white-space: nowrap; display: inline-block; }
.tick:hover { animation-play-state: paused; }

/* blink */
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.blink { animation: blink 1s step-end infinite; }

/* enter */
@keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.enter { animation: up .38s cubic-bezier(.22,1,.36,1) both; }

/* page */
@keyframes pIn { from{opacity:0;transform:translateX(18px)} to{opacity:1;transform:translateX(0)} }
.pIn { animation: pIn .26s cubic-bezier(.22,1,.36,1) both; }

/* progress */
@keyframes prog { from{width:0} to{width:100%} }
.prog { animation: prog .6s ease-out forwards; }

/* shake */
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)} 40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}
}

/* hover card */
.card { transition: transform .08s, box-shadow .08s; cursor: pointer; }
.card:hover { transform: translate(-4px,-4px); }

/* modal */
.modal {
  position: fixed; inset: 0; z-index: 8000;
  background: rgba(255,255,255,.95);
  display: flex; align-items: center; justify-content: center;
}

/* tag flash for breach */
@keyframes flash { 0%,100%{opacity:1} 50%{opacity:.5} }

.page-shell {
  max-width: 1100px;
  margin: 0 auto;
  padding-left: var(--gutter);
  padding-right: var(--gutter);
}
.masthead-grid { display: block; }
.header-combo { border: var(--b); background: #fff; }
.combo-inner { display: grid; grid-template-columns: 1.1fr 0.9fr; align-items: stretch; }
.combo-left { border-right: var(--b); }
.filter-scroll { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-scroll button { flex: 0 0 auto; }
.filter-scroll::-webkit-scrollbar { height: 4px; }
.stat-grid { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); border-bottom: 2px solid #000; }
.stat-cell { padding: 20px 16px; text-align: center; border-right: 2px solid #000; }
.stat-cell:last-child { border-right: none; }
.edition-stats { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 10px; margin-bottom: 12px; }
.edition-stat { min-width: 0; }
.featured-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
.detail-shell { max-width: 1120px; margin: 0 auto; padding: 0 20px 100px; }
.detail-main-layout { display: grid; grid-template-columns: minmax(0,1fr) 300px; gap: 24px; align-items: start; position: relative; }
.detail-article { min-width: 0; }
.toc-rail {
  position: absolute;
  left: 0;
  top: calc(100% + 8px);
  width: 240px;
  max-height: min(64vh, 620px);
  overflow: auto;
  border: var(--b);
  background: #fff;
  padding: 12px;
  z-index: 45;
  box-shadow: 8px 8px 0 #000;
}
.detail-top-actions {
  position: sticky;
  top: 10px;
  z-index: 44;
  transition: transform .32s ease, opacity .32s ease;
}
.detail-top-actions.hidden {
  transform: translateY(-130%);
  opacity: 0;
  pointer-events: none;
}
.latest-rail { position: sticky; top: 14px; border: var(--b); background: #fff; }

@media (max-width: 980px) {
  .masthead-grid { grid-template-columns: 1fr; gap: 14px; }
  .combo-inner { grid-template-columns: 1fr; }
  .combo-left { border-right: none; border-bottom: var(--b); }
  .featured-layout { grid-template-columns: 1fr; gap: 26px; }
  .detail-main-layout { grid-template-columns: 1fr; }
  .toc-rail { left: 0; top: calc(100% + 8px); width: min(86vw, 280px); max-height: 64vh; }
  .detail-top-actions { top: 6px; }
  .latest-rail { position: static; }
}

@media (max-width: 1180px) and (min-width: 981px) {
  .detail-main-layout { grid-template-columns: minmax(0,1fr) 280px; }
}

@media (max-width: 760px) {
  .ticker-wrap { display: none; }
  .masthead-grid { padding: 10px !important; }
  .stat-grid { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; border-bottom: 2px solid #000; }
  .stat-cell { flex: 0 0 132px; border-right: 2px solid #000; scroll-snap-align: start; }
  .stat-grid { scroll-snap-type: x mandatory; }
  .edition-stats { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 8px; }
  .edition-stat { flex: 0 0 110px; scroll-snap-align: start; }
  .edition-stats { scroll-snap-type: x proximity; }
  .filter-spacer { display: none; }
  .detail-shell { padding: 0 16px 80px; }
  .filter-scroll { border-bottom: 2px solid #000; }
}

@media (max-width: 560px) {
  .page-shell {
    max-width: 100%;
    padding-left: 8px;
    padding-right: 8px;
  }
  .page-shell > header { margin-bottom: 8px; }
  .page-shell main { padding-left: 0; padding-right: 0; }
  .page-shell footer { margin-left: 0; margin-right: 0; }
  .masthead-grid { gap: 10px; padding: 8px !important; }
  .brand-panel { padding: 10px !important; border-width: 3px !important; }
  .masthead-meta { font-size: 9px !important; letter-spacing: 0.14em !important; gap: 6px !important; margin-bottom: 8px !important; padding-bottom: 7px !important; }
  .meta-issn { display: none; }
  .brand-title { font-size: clamp(44px,17vw,68px) !important; line-height: 0.88 !important; margin-bottom: 6px !important; }
  .brand-sub { font-size: 10px !important; letter-spacing: 0.16em !important; padding-top: 8px !important; }
  .edition-panel { padding: 10px !important; box-shadow: none !important; border-width: 3px !important; }
  .edition-toprow { margin-bottom: 8px !important; padding-bottom: 6px !important; }
  .edition-stat { flex-basis: 100px; padding: 6px 7px 5px !important; border-width: 2px !important; }
  .edition-foot { display: none; }
  .filter-scroll {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    overflow: visible;
    border: 2px solid #000;
    margin-top: 0;
    margin-bottom: 10px;
    margin-left: 0;
    margin-right: 0;
  }
  .filter-scroll button {
    width: 100%;
    padding: 11px 12px !important;
    font-size: 10px !important;
    letter-spacing: 0.12em !important;
    border: 0 !important;
    border-left: 2px solid #000 !important;
  }
  .filter-scroll button:first-child { border-left: 0 !important; }
  .filter-spacer { display: none !important; }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    overflow: visible;
    border: 2px solid #000;
    scroll-snap-type: none;
    margin-top: 0;
    margin-bottom: 12px;
    margin-left: 0;
    margin-right: 0;
  }
  .stat-cell {
    padding: 14px 12px;
    min-width: 0;
    flex: initial;
    border-right: 0;
    border-left: 2px solid #000;
    --stat-num-size: clamp(22px, 8vw, 32px);
  }
  .stat-cell:first-child { border-left: 0; }
  .stat-cell > div:last-child {
    margin-top: 8px !important;
    line-height: 1.2;
  }
  .stat-label {
    display: block;
    width: 100%;
    text-align: center;
    letter-spacing: 0.16em !important;
  }
  .stat-cell:nth-child(4n) { border-right: 0; }
  .featured-card {
    padding: 24px 18px !important;
    border-top: var(--b) !important;
    margin-top: 6px;
  }
  .news-card {
    padding: 18px 14px !important;
  }
  .featured-layout { gap: 18px; }
  .detail-shell { padding: 0 10px 70px; }
  .detail-article h1 { font-size: clamp(34px,11vw,52px) !important; }
  .latest-rail { margin-top: 14px; }
  .latest-rail button { padding-left: 8px !important; padding-right: 6px !important; }
  .detail-actions {
    display: flex !important;
    gap: 8px !important;
    flex-wrap: nowrap !important;
    align-items: stretch;
  }
  .detail-actions .detail-btn {
    flex: 1 1 0;
    margin-right: 0 !important;
    padding: 12px 10px !important;
    font-size: 10px !important;
    letter-spacing: 0.1em !important;
    text-align: center;
    white-space: nowrap;
  }
}
</style>
</head>
<body>
<div id="root"></div>
<script src="./app.js" defer></script>
</body>
</html>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:  #ffffff;
  --fg:  #000000;
  --red: #ff0000;
  --blu: #0000ff;
  --grn: #007700;
  --b:   4px solid #000;
  --gutter: clamp(10px, 2.2vw, 20px);
  --font: 'JetBrains Mono', 'Courier New', monospace;
}

html { background: var(--bg); }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

::selection { background: #000; color: #fff; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #fff; }
::-webkit-scrollbar-thumb { background: #000; }

/* ticker */
@keyframes ticker { to { transform: translateX(-50%); } }
.tick { animation: ticker 36s linear infinite; white-space: nowrap; display: inline-block; }
.tick:hover { animation-play-state: paused; }

/* blink */
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.blink { animation: blink 1s step-end infinite; }

/* enter */
@keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.enter { animation: up .38s cubic-bezier(.22,1,.36,1) both; }

/* page */
@keyframes pIn { from{opacity:0;transform:translateX(18px)} to{opacity:1;transform:translateX(0)} }
.pIn { animation: pIn .26s cubic-bezier(.22,1,.36,1) both; }

/* progress */
@keyframes prog { from{width:0} to{width:100%} }
.prog { animation: prog .6s ease-out forwards; }

/* shake */
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)} 40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}
}

/* hover card */
.card { transition: transform .08s, box-shadow .08s; cursor: pointer; }
.card:hover { transform: translate(-4px,-4px); }

/* modal */
.modal {
  position: fixed; inset: 0; z-index: 8000;
  background: rgba(255,255,255,.95);
  display: flex; align-items: center; justify-content: center;
}

/* tag flash for breach */
@keyframes flash { 0%,100%{opacity:1} 50%{opacity:.5} }

.page-shell {
  max-width: 1100px;
  margin: 0 auto;
  padding-left: var(--gutter);
  padding-right: var(--gutter);
}
.masthead-grid { display: block; }
.header-combo { border: var(--b); background: #fff; }
.combo-inner { display: grid; grid-template-columns: 1.1fr 0.9fr; align-items: stretch; }
.combo-left { border-right: var(--b); }
.filter-scroll { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-scroll button { flex: 0 0 auto; }
.filter-scroll::-webkit-scrollbar { height: 4px; }
.stat-grid { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); border-bottom: 2px solid #000; }
.stat-cell { padding: 20px 16px; text-align: center; border-right: 2px solid #000; }
.stat-cell:last-child { border-right: none; }
.edition-stats { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 10px; margin-bottom: 12px; }
.edition-stat { min-width: 0; }
.featured-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
.detail-shell { max-width: 1120px; margin: 0 auto; padding: 0 20px 100px; }
.detail-main-layout { display: grid; grid-template-columns: minmax(0,1fr) 300px; gap: 24px; align-items: start; position: relative; }
.detail-article { min-width: 0; }
.toc-rail {
  position: absolute;
  left: 0;
  top: calc(100% + 8px);
  width: 240px;
  max-height: min(64vh, 620px);
  overflow: auto;
  border: var(--b);
  background: #fff;
  padding: 12px;
  z-index: 45;
  box-shadow: 8px 8px 0 #000;
}
.detail-top-actions {
  position: sticky;
  top: 10px;
  z-index: 44;
  transition: transform .32s ease, opacity .32s ease;
}
.detail-top-actions.hidden {
  transform: translateY(-130%);
  opacity: 0;
  pointer-events: none;
}
.latest-rail { position: sticky; top: 14px; border: var(--b); background: #fff; }

@media (max-width: 980px) {
  .masthead-grid { grid-template-columns: 1fr; gap: 14px; }

  .latest-rail { position: static; }

@media (max-width: 1180px) and (min-width: 981px) {

@media (max-width: 760px) {

  .edition-panel { padding: 10px !important; box-shadow: none !important; border-width: 3px !important; }
  .edition-toprow { margin-bottom: 8px !important; padding-bottom: 6px !important; }
  .edition-stat { flex-basis: 100px; padding: 6px 7px 5px !important; border-width: 2px !important; }
  .edition-foot { display: none; }
  .filter-scroll {
    display: grid;

    overflow: visible;
    border: 2px solid #000;
    margin-top: 0;

    margin-left: 0;
    margin-right: 0;
  }
  .filter-scroll button {
    width: 100%;

    font-size: 10px !important;
    letter-spacing: 0.12em !important;
    border: 0 !important;
    border-left: 2px solid #000 !important;
  }
  .filter-scroll button:first-child { border-left: 0 !important; }
  .filter-spacer { display: none !important; }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    overflow: visible;
    border: 2px solid #000;
    scroll-snap-type: none;
    margin-top: 0;
    margin-bottom: 12px;
    margin-left: 0;
    margin-right: 0;
  }
  .stat-cell {
    padding: 14px 12px;
    min-width: 0;
    flex: initial;

  .stat-cell:first-child { border-left: 0; }

  .stat-label {

  .featured-card {
    padding: 24px 18px !important;

  }
  .news-card {
    padding: 18px 14px !important;

  .featured-layout { gap: 18px; }
  .detail-shell { padding: 0 10px 70px; }
  .detail-article h1 { font-size: clamp(34px,11vw,52px) !important; }
  .latest-rail { margin-top: 14px; }
  .latest-rail button { padding-left: 8px !important; padding-right: 6px !important; }
  .detail-actions {
    display: flex !important;
    gap: 8px !important;
    flex-wrap: nowrap !important;

  }
  .detail-actions .detail-btn {
    flex: 1 1 0;
    margin-right: 0 !important;
    padding: 12px 10px !important;
    font-size: 10px !important;
    letter-spacing: 0.1em !important;
    text-align: center;
    white-space: nowrap;
  }
}
</style>

        {text}{'   //   '}{text}{'   //   '}
      </div>
    </div>
  );
}

  const c = TAG_COLOR[tag]||'#000';

  return (
    <span style={{
      background:c, color:'#fff',
      fontSize:10, fontWeight:800, padding:'3px 10px', letterSpacing:'0.2em',
      display:'inline-block',
      animation: flash ? 'flash 2.5s ease-in-out infinite' : 'none',
    }}>{tag==='BREACH'?'BRECHA':tag}</span>

}
function SevBadge({ severity, cvss, tag }) {
  if (!severity) return null;

        </div>
          </div>

      {/* filter nav */}

            <button key={cat} onClick={()=>setFilter(cat)} style={{
              background: active?(cat==='TODOS'?'#000':c):'transparent',
              color: active?'#fff':(cat==='TODOS'?'#000':c),
              border:'2px solid #000', borderRight:i<cats.length-1?'none':'2px solid #000',
              fontFamily:'var(--font)',fontSize:11,fontWeight:800,
              padding:'12px 22px',cursor:'pointer',letterSpacing:'0.16em',
              transition:'background .08s,color .08s,transform .08s,box-shadow .08s',
              transform:'none',
              boxShadow:'none',
            }}
              onMouseEnter={e=>{
                if (cat==='TODOS') return;
                e.currentTarget.style.transform='translate(-2px,-2px)';
                e.currentTarget.style.boxShadow=`4px 4px 0 ${cat==='TODOS'?'#000':c}`;
              }}
              onMouseLeave={e=>{
                e.currentTarget.style.transform='none';
                e.currentTarget.style.boxShadow='none';
              }}
            >{cat==='BREACH'?'BRECHAS':cat}</button>
          );

}

/* ── DETAIL ── */
function Detail({ post, posts, onOpenPost, onBack }) {
  useEffect(()=>{ window.scrollTo(0,0); },[]);
  const c = TAG_COLOR[post.tag]||'#000';
  const [tocOpen, setTocOpen] = useState(false);
  const [showTopActions, setShowTopActions] = useState(true);
  useEffect(() => {
    let lastY = window.scrollY;
    const onScroll = () => {
      const y = window.scrollY;
      const delta = y - lastY;
      if (y <= 24) {
        setShowTopActions(true);
        lastY = y;
        return;
      }
      if (delta > 14 && y > 360) setShowTopActions(false);
      else if (delta < -8) setShowTopActions(true);
      lastY = y;
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  const latestPosts = ['BREACH','IA','TECNOLOGÍA']
    .map(tag => posts.find(p => p.id !== post.id && p.tag === tag))
    .filter(Boolean);
  const [hoverLatest, setHoverLatest] = useState(null);
  const sections = post.body
    .split('\n')
    .map(l => l.trim())
    .filter(l => l.startsWith('# '))
    .map(l => l.slice(2).trim());
  const highlights = post.body
    .split('\n')
    .map(l => l.trim())
    .filter(l => l.startsWith('- ') || l.match(/^\d+\. /))
    .map(l => l.replace(/^- /, '').replace(/^\d+\. /, ''))
    .slice(0, 3);

  const renderBody = txt => {
    let secIdx = 0;
    return txt.split('\n').map((line,i)=>{
    if (!line.trim()) return <div key={i} style={{height:14}}/>;
    if (line.startsWith('# ')) {
      const sectionId = `section-${secIdx++}`;
      return <h2 id={sectionId} key={i} style={{fontSize:14,fontWeight:800,letterSpacing:'0.16em',color:c,marginTop:38,marginBottom:12,textTransform:'uppercase',borderBottom:`2px solid ${c}`,paddingBottom:7,scrollMarginTop:16}}>{line.slice(2)}</h2>;
    }
    if (line.startsWith('- '))
      return <div key={i} style={{display:'flex',gap:14,marginBottom:10,paddingLeft:4}}>
        <span style={{color:c,flexShrink:0,fontWeight:800}}>—</span>
        <span style={{fontSize:15,lineHeight:1.9,color:'#222'}}>{line.slice(2)}</span>
      </div>;
    if (line.match(/^\d+\. /))
      return <div key={i} style={{display:'flex',gap:12,marginBottom:10,paddingLeft:4}}>
        <span style={{color:c,flexShrink:0,fontWeight:800,minWidth:20}}>{line.match(/^\d+/)[0]}.</span>
        <span style={{fontSize:15,lineHeight:1.9,color:'#222'}}>{line.replace(/^\d+\. /,'')}</span>
      </div>;
    return <p key={i} style={{fontSize:15,lineHeight:1.92,color:'#222',marginBottom:6,textWrap:'pretty'}}>{line}</p>;
  });
  };

  return (
    <div className="pIn detail-shell">
      <div className="detail-main-layout" style={{marginTop:24}}>
        <div className="detail-article">
          <div className={`detail-top-actions ${(!showTopActions && !tocOpen) ? 'hidden' : ''}`} style={{margin:'0 0 28px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12,minHeight:16,background:'transparent',border:'none',padding:'0'}}>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',position:'relative'}}>
              <button onClick={onBack} style={{background:'var(--bg)',border:'var(--b)',color:'#000',fontFamily:'var(--font)',fontSize:11,fontWeight:700,padding:'9px 16px',cursor:'pointer',letterSpacing:'0.12em',transition:'all .08s'}}
                onMouseEnter={e=>{e.currentTarget.style.background='#000';e.currentTarget.style.color='#fff';}}
                onMouseLeave={e=>{e.currentTarget.style.background='var(--bg)';e.currentTarget.style.color='#000';}}
              >← ÍNDICE</button>
              <button
                onClick={()=>setTocOpen(v=>!v)}
                style={{background:tocOpen?'#000':'#fff',border:'var(--b)',color:tocOpen?'#fff':'#000',fontFamily:'var(--font)',fontSize:11,fontWeight:800,padding:'9px 16px',cursor:'pointer',letterSpacing:'0.12em',transition:'all .08s'}}
                onMouseEnter={e=>{e.currentTarget.style.transform='translate(-2px,-2px)';e.currentTarget.style.boxShadow=`4px 4px 0 ${c}`;}}
                onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='none';}}
              >
                {tocOpen ? 'CERRAR ÍNDICE' : 'ABRIR ÍNDICE'}
              </button>
              {tocOpen && <aside className="toc-rail">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                  <div style={{fontSize:10,fontWeight:800,letterSpacing:'0.16em',color:'#666'}}>ÍNDICE</div>
                  <button onClick={()=>setTocOpen(false)} style={{background:'#000',border:'2px solid #000',color:'#fff',fontFamily:'var(--font)',fontSize:10,fontWeight:700,padding:'4px 8px',cursor:'pointer',letterSpacing:'0.1em'}}>X</button>
                </div>
                {sections.length ? sections.map((title, idx) => (
                  <button key={`${title}-${idx}`} onClick={() => {
                    const el = document.getElementById(`section-${idx}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    setTocOpen(false);
                  }} style={{display:'block',width:'100%',textAlign:'left',background:'transparent',border:'2px solid #eee',padding:'8px 9px',marginBottom:8,cursor:'pointer',fontFamily:'var(--font)',fontSize:11,lineHeight:1.45,color:'#333',letterSpacing:'0.03em',transition:'all .08s'}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=c;e.currentTarget.style.color='#000';}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor='#eee';e.currentTarget.style.color='#333';}}
                  >{title}</button>
                )) : (
                  <div style={{fontSize:11,color:'#888',lineHeight:1.5}}>Sin secciones detectadas.</div>
                )}
              </aside>}
              </div>
            </div>
          </div>

          <div style={{display:'flex',gap:9,flexWrap:'wrap',marginBottom:16,alignItems:'center'}}>
            <Tag tag={post.tag}/><SevBadge tag={post.tag} severity={post.severity} cvss={post.cvss}/>
            <span style={{marginLeft:'auto',fontSize:11,color:'#aaa',letterSpacing:'0.08em'}}>{fmtDate(post.date)} · {post.readTime} de lectura</span>
          </div>

          <h1 style={{fontSize:'clamp(22px,3vw,52px)',fontWeight:800,lineHeight:1.14,letterSpacing:'-0.028em',marginBottom:24,paddingBottom:22,borderBottom:'var(--b)',textWrap:'balance',color:'#000'}}>
            {post.title}
          </h1>

          <div style={{borderLeft:`6px solid ${c}`,paddingLeft:20,marginBottom:20}}>
            <p style={{fontSize:15,lineHeight:1.78,fontStyle:'italic',color:'#333'}}>{post.summary}</p>
          </div>

          {highlights.length > 0 && (
            <div style={{border:'var(--b)',padding:'16px 18px',marginBottom:26,background:'#fafafa'}}>
              <div style={{fontSize:10,fontWeight:800,letterSpacing:'0.18em',color:'#666',marginBottom:10}}>CLAVES RÁPIDAS</div>
              {highlights.map((h, i) => (
                <div key={i} style={{display:'flex',gap:10,marginBottom:i<highlights.length-1?7:0}}>
                  <span style={{color:c,fontWeight:800,flexShrink:0}}>{String(i+1).padStart(2,'0')}</span>
                  <span style={{fontSize:13,lineHeight:1.7,color:'#222'}}>{h}</span>
                </div>
              ))}
            </div>
          )}

          <div style={{border:'var(--b)',padding:'24px 24px 14px',background:'#fff'}}>
            {renderBody(post.body)}
          </div>

          <div className="detail-actions" style={{borderTop:'var(--b)',marginTop:44,paddingTop:20}}>
            <button className="detail-btn" onClick={onBack} style={{background:'#000',color:'#fff',border:'var(--b)',fontFamily:'var(--font)',fontSize:12,fontWeight:800,padding:'14px 28px',cursor:'pointer',letterSpacing:'0.15em',transition:'transform .08s,box-shadow .08s',marginRight:10}}
              onMouseEnter={e=>{e.currentTarget.style.transform='translate(-3px,-3px)';e.currentTarget.style.boxShadow=`5px 5px 0 ${c}`;}}
              onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='none';}}
            >← VOLVER AL ÍNDICE</button>
            <button className="detail-btn" onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} style={{background:'transparent',color:'#000',border:'var(--b)',fontFamily:'var(--font)',fontSize:11,fontWeight:700,padding:'13px 20px',cursor:'pointer',letterSpacing:'0.12em',transition:'all .08s'}}
              onMouseEnter={e=>{e.currentTarget.style.background='#000';e.currentTarget.style.color='#fff';}}
              onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='#000';}}
            >IR ARRIBA ↑</button>
          </div>
        </div>

        <aside className="latest-rail" style={{padding:'14px 14px 6px'}}>
          <div style={{fontSize:10,fontWeight:800,letterSpacing:'0.18em',color:'#666',marginBottom:10}}>ÚLTIMAS NOTICIAS</div>
          {latestPosts.map((p, idx) => (
            <button key={p.id} onClick={()=>onOpenPost(p.id)}
              onMouseEnter={()=>setHoverLatest(p.id)}
              onMouseLeave={()=>setHoverLatest(null)}
              onFocus={()=>setHoverLatest(p.id)}
              onBlur={()=>setHoverLatest(null)}
              style={{
                display:'block',
                width:'100%',
                textAlign:'left',
                background:hoverLatest===p.id?'#f6f6f6':'transparent',
                border:'none',
                borderLeft:hoverLatest===p.id?`4px solid ${TAG_COLOR[p.tag]||'#000'}`:'4px solid transparent',
                padding:'8px 8px 12px 10px',
                marginBottom:idx<latestPosts.length-1?12:0,
                cursor:'pointer',
                borderBottom:idx<latestPosts.length-1?'2px solid #eee':'none',
                fontFamily:'var(--font)',
                transform:hoverLatest===p.id?'translateX(2px)':'none',
                transition:'all .1s ease'
              }}>
              <div style={{display:'flex',justifyContent:'space-between',gap:8,alignItems:'center',marginBottom:6}}>
                <Tag tag={p.tag}/>
                <span style={{fontSize:10,color:'#999'}}>{fmtDate(p.date)}</span>
              </div>
              <div style={{fontSize:14,fontWeight:700,lineHeight:1.35,color:'#000',marginBottom:6}}>
                {p.title}{hoverLatest===p.id?'  →':''}
              </div>
              <div style={{fontSize:11,color:'#666',lineHeight:1.55}}>
                {p.summary.slice(0,110)}{p.summary.length>110?'...':''}
              </div>
            </button>
          ))}
        </aside>
      </div>
    </div>
  );
}

/* ── TWEAKS ── */
function Tweaks({ tweaks, setTweaks, visible }) {
  if (!visible) return null;
  return (
    <div style={{position:'fixed',bottom:24,right:24,width:244,background:'#fff',border:'var(--b)',zIndex:9999,boxShadow:'6px 6px 0 #000',fontFamily:'var(--font)'}}>
      <div style={{background:'#000',color:'#fff',padding:'11px 16px',fontSize:11,fontWeight:800,letterSpacing:'0.2em'}}>■ TWEAKS</div>
      <div style={{padding:16,display:'flex',flexDirection:'column',gap:16}}>
        <div>
          <div style={{fontSize:10,fontWeight:800,letterSpacing:'0.2em',color:'#666',marginBottom:6}}>TEXTO: {tweaks.fontSize}px</div>
          <input type="range" min={12} max={18} value={tweaks.fontSize} style={{width:'100%',accentColor:'#ff0000'}}
            onChange={e=>{const v=Number(e.target.value);setTweaks(t=>({...t,fontSize:v}));document.body.style.fontSize=v+'px';window.parent.postMessage({type:'__edit_mode_set_keys',edits:{fontSize:v}},'*');}}/>
        </div>
        <label style={{display:'flex',justifyContent:'space-between',fontSize:11,letterSpacing:'0.1em',cursor:'pointer',alignItems:'center'}}>
          <span style={{color:'#666'}}>TICKER</span>
          <input type="checkbox" checked={tweaks.showTicker} style={{accentColor:'#ff0000',width:15,height:15}}
            onChange={e=>{setTweaks(t=>({...t,showTicker:e.target.checked}));window.parent.postMessage({type:'__edit_mode_set_keys',edits:{showTicker:e.target.checked}},'*');}}/>
        </label>
        <label style={{display:'flex',justifyContent:'space-between',fontSize:11,letterSpacing:'0.1em',cursor:'pointer',alignItems:'center'}}>
          <span style={{color:'#666'}}>MODO OSCURO</span>
          <input type="checkbox" checked={tweaks.darkMode} style={{accentColor:'#ff0000',width:15,height:15}}
            onChange={e=>{
              const d=e.target.checked;
              setTweaks(t=>({...t,darkMode:d}));
              document.documentElement.style.setProperty('--bg',d?'#000':'#fff');
              document.documentElement.style.setProperty('--fg',d?'#fff':'#000');
              document.documentElement.style.setProperty('--b',d?'4px solid #fff':'4px solid #000');
              document.body.style.background=d?'#000':'#fff';
              document.body.style.color=d?'#fff':'#000';
              window.parent.postMessage({type:'__edit_mode_set_keys',edits:{darkMode:d}},'*');
            }}/>
        </label>
      </div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [tweaks,setTweaks]=useState(TWEAK_DEFAULTS);
  const [tweaksVis,setTweaksVis]=useState(false);
  const [posts,setPosts]=useState(SEED);
  const [filter,setFilter]=useState('TODOS');
  const [activePost,setActivePost]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState('');

  useEffect(()=>{
    const s=localStorage.getItem('dvblog_active');
    if(s) setActivePost(parseInt(s));
  },[]);
  useEffect(()=>{
    if(activePost!=null) localStorage.setItem('dvblog_active',activePost);
    else localStorage.removeItem('dvblog_active');
  },[activePost]);
  useEffect(()=>{
    window.addEventListener('message',e=>{
      if(e.data?.type==='__activate_edit_mode') setTweaksVis(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksVis(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'},'*');
  },[]);

  useEffect(()=>{
    const load = async () => {
      try {
        setLoading(true);
        const remotePosts = await loadPostsFromFile();
        setPosts(remotePosts);
      } catch {
        setError('No se pudo cargar data/posts.json. Mostrando datos de ejemplo.');
      } finally {
        setLoading(false);
      }
    };
    load();
  },[]);

  const filtered = filter==='TODOS'?posts:posts.filter(p=>p.tag===filter);
  const [featured,...rest] = filtered;
  const currentPost = activePost!=null ? posts.find(p=>p.id===activePost) : null;
  const handleFilterFromDetail = (nextFilter) => {
    setFilter(nextFilter);
    setActivePost(null);
  };

  /* DETAIL */
  if (currentPost) return <>
    <div className="page-shell">
      <Header filter={filter} setFilter={handleFilterFromDetail} showTicker={tweaks.showTicker} posts={posts}/>
      <StatRow posts={posts}/>
      <Detail post={currentPost} posts={posts} onOpenPost={setActivePost} onBack={()=>setActivePost(null)}/>
      <footer style={{borderTop:'var(--b)',padding:'16px 32px',display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:12,fontSize:10,color:'#bbb',letterSpacing:'0.12em',marginTop:40}}>
        <span>DEVBLOG © 2026</span>
        <span>SEGURIDAD · IA · TECNOLOGÍA CRÍTICA</span>
      </footer>
    </div>
    <Tweaks tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVis}/>
  </>;

  /* INDEX */
  return <>
    <div className="page-shell">
      <Header filter={filter} setFilter={setFilter} showTicker={tweaks.showTicker} posts={posts}/>
      <StatRow posts={posts}/>
      {loading && (
        <div className="enter" style={{border:'var(--b)',borderTop:'none',padding:'44px 32px',fontSize:12,color:'#777',letterSpacing:'0.1em'}}>
          CARGANDO PUBLICACIONES...
        </div>
      )}
      {error && (
        <div className="enter" style={{border:'var(--b)',borderTop:'none',padding:'16px 20px',fontSize:11,color:'#ff0000',fontWeight:700,letterSpacing:'0.1em'}}>
          {error}
        </div>
      )}
      <main>
        {!loading && filtered.length===0&&(
          <div className="enter" style={{border:'var(--b)',borderTop:'none',padding:'72px 40px',textAlign:'center'}}>
            <div style={{fontSize:'clamp(40px,6vw,72px)',fontWeight:800,letterSpacing:'-0.04em',lineHeight:1,marginBottom:20}}>SIN ARTÍCULOS</div>
            <div style={{fontSize:12,color:'#aaa',letterSpacing:'0.15em',marginBottom:32}}>NO HAY PUBLICACIONES EN ESTA CATEGORÍA</div>
            <button onClick={()=>setFilter('TODOS')} style={{background:'transparent',border:'var(--b)',color:'#000',fontFamily:'var(--font)',fontSize:11,fontWeight:700,padding:'11px 22px',cursor:'pointer',letterSpacing:'0.15em'}}>VER TODOS</button>
          </div>
        )}
        {featured&&<Featured post={featured} onClick={()=>setActivePost(featured.id)}/>}
        {rest.length>0&&(
          <div style={{display:'flex',flexWrap:'wrap',borderLeft:'var(--b)',borderBottom:'var(--b)'}}>
            {rest.map((post,i)=>(
              <div key={post.id} style={{flex:'1 1 300px',borderTop:'var(--b)',borderRight:'var(--b)'}}>
                <Card post={post} onClick={()=>setActivePost(post.id)} delay={60+i*50}/>
              </div>
            ))}
          </div>
        )}
      </main>

      {/* footer — admin link oculto */}
      <footer style={{borderTop:'var(--b)',padding:'16px 32px',display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:12,fontSize:10,color:'#bbb',letterSpacing:'0.12em',marginTop:40}}>
        <span>DEVBLOG © 2026</span>
        <span>SEGURIDAD · IA · TECNOLOGÍA CRÍTICA</span>
      </footer>
    </div>

    <Tweaks tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVis}/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
